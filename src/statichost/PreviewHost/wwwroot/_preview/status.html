<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aspire PR Preview</title>
  <link rel="icon" type="image/svg+xml" href="/_preview/aspire-mark.svg">
  <link rel="stylesheet" href="/_preview/preview.css">
</head>
<body data-view="status">
  <div class="page-chrome">
    <div class="page-chrome-actions">
      <a class="nav-button" href="/prs/" data-preserve-preparation="true">
        <span class="action-icon action-icon-left-arrow" aria-hidden="true"></span>
        <span>Back</span>
      </a>
      <div class="session-actions session-toolbar" aria-label="Viewer actions">
        <a id="viewer-summary" class="viewer-summary" href="#" target="_blank" rel="noreferrer noopener" hidden>
          <img id="viewer-avatar" class="viewer-avatar" alt="" hidden>
          <span class="viewer-copy">
            <strong id="viewer-name">Signed in</strong>
            <span class="viewer-role">GitHub repo writer</span>
          </span>
        </a>
        <a id="signout-link" class="action-link action-link-quiet action-link-compact" href="#" hidden>Sign out</a>
      </div>
    </div>
  </div>

  <main class="page-shell">
    <section class="status-card">
      <div id="card-busy-indicator" class="card-busy-indicator" hidden aria-hidden="true">
        <span class="card-spinner"></span>
      </div>

      <header class="card-header">
        <div class="header-copy">
          <a class="brand-lockup" href="/prs/" aria-label="Aspire PR previews home" data-preserve-preparation="true">
            <img class="brand-mark" src="/_preview/aspire-mark.svg" alt="Aspire logo">
            <span class="brand-text">
              <strong class="brand-title">Aspire</strong>
              <span class="brand-subtitle">PR Preview</span>
            </span>
          </a>
          <h1 id="page-title">Preparing PR</h1>
        </div>
      </header>

      <p id="message" class="status-message"></p>

      <section id="progress-section" class="progress-section" hidden>
        <article class="progress-card">
          <div class="progress-header">
            <span>Overall</span>
            <strong id="overall-progress-value">0%</strong>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="overall-progress-bar" class="progress-bar"></div>
          </div>
        </article>

        <article class="progress-card">
          <div class="progress-header">
            <span id="stage-progress-label">Stage</span>
            <strong id="stage-progress-value">0%</strong>
          </div>
          <div class="progress-track stage" aria-hidden="true">
            <div id="stage-progress-bar" class="progress-bar"></div>
          </div>
        </article>
      </section>

      <section id="terminal-section" class="terminal-section" hidden>
        <span id="terminal-chip" class="status-chip"></span>
        <p id="terminal-summary" class="terminal-summary"></p>
      </section>

      <dl class="detail-grid">
        <div>
          <dt>Status</dt>
          <dd id="status-value">Preparing</dd>
        </div>
        <div>
          <dt>Overall</dt>
          <dd id="overall-summary">0%</dd>
        </div>
        <div>
          <dt>Preview path</dt>
          <dd id="preview-path">/prs/</dd>
        </div>
        <div>
          <dt>Updated</dt>
          <dd id="updated-at">Waiting</dd>
        </div>
        <div id="download-detail-group" hidden>
          <dt>Download</dt>
          <dd id="download-detail">Waiting</dd>
        </div>
        <div id="extract-detail-group" hidden>
          <dt>Preview files</dt>
          <dd id="extract-detail">Waiting</dd>
        </div>
      </dl>

      <p id="hint" class="hint-text"></p>

      <footer id="status-card-actions" class="status-card-actions" hidden>
        <div class="status-card-secondary-actions">
          <a id="open-pr-link" class="action-link action-link-github" href="#" target="_blank" rel="noreferrer noopener" hidden>
            <span class="action-icon action-icon-github" aria-hidden="true"></span>
            <span>Open PR</span>
          </a>
        </div>
        <div class="status-card-primary-actions">
          <button id="retry-button" class="action-button primary" type="button" hidden>
            <span class="action-icon action-icon-retry" aria-hidden="true"></span>
            <span class="button-label">Retry</span>
          </button>
          <button id="cancel-button" class="action-button danger" type="button" hidden>Cancel</button>
        </div>
      </footer>
    </section>
  </main>

  <script type="module" src="/_preview/status.js"></script>
</body>
</html>
