<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aspire PR Previews</title>
  <link rel="icon" type="image/svg+xml" href="/_preview/aspire-mark.svg">
  <link rel="stylesheet" href="/_preview/preview.css">
</head>
<body data-view="index">
  <main class="page-shell page-shell-wide">
    <header class="collection-header">
      <div class="header-copy">
        <a class="brand-lockup" href="/prs/" aria-label="Aspire PR previews home">
          <img class="brand-mark" src="/_preview/aspire-mark.svg" alt="Aspire logo">
          <span class="brand-text">
            <strong class="brand-title">Aspire</strong>
            <span class="brand-subtitle">PR Preview</span>
          </span>
        </a>
        <p class="eyebrow">Aspire PR Preview</p>
        <h1>Recent preview window</h1>
        <p class="collection-summary">Open a route like <code>/prs/{number}/</code> to resolve a PR, prepare its latest frontend artifact, and add it to this window.</p>
      </div>
      <div class="collection-meta">
        <a class="action-link action-link-github" href="https://github.com/microsoft/aspire.dev" target="_blank" rel="noreferrer noopener">
          <span class="action-icon action-icon-github" aria-hidden="true"></span>
          <span>Repository</span>
        </a>
        <strong id="window-capacity">Up to 0 PRs</strong>
        <span id="window-count">Current entries: 0</span>
      </div>
    </header>

    <section id="preview-grid" class="preview-grid" aria-live="polite"></section>
  </main>

  <script type="module" src="/_preview/index.js"></script>
</body>
</html>
