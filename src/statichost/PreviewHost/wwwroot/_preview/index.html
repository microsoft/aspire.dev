<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aspire PR Previews</title>
  <link rel="icon" type="image/svg+xml" href="/_preview/aspire-mark.svg">
  <link rel="stylesheet" href="/_preview/preview.css">
</head>
<body data-view="index">
  <main class="page-shell page-shell-wide">
    <header class="collection-header">
      <div class="header-copy">
        <a class="brand-lockup" href="/prs/" aria-label="Aspire PR previews home">
          <img class="brand-mark" src="/_preview/aspire-mark.svg" alt="Aspire logo">
          <span class="brand-text">
            <strong class="brand-title">Aspire</strong>
            <span class="brand-subtitle">PR Preview</span>
          </span>
        </a>
        <p class="eyebrow">Aspire PR Preview</p>
        <h1>Open PRs</h1>
        <p class="collection-summary">Open any PR to warm its latest frontend preview. Only a small active window stays hot.</p>
      </div>
      <div class="collection-meta">
        <div class="collection-actions session-toolbar" aria-label="Viewer actions">
          <a id="viewer-summary" class="viewer-summary" href="#" target="_blank" rel="noreferrer noopener" hidden>
            <img id="viewer-avatar" class="viewer-avatar" alt="" hidden>
            <span class="viewer-copy">
              <strong id="viewer-name">Signed in</strong>
              <span class="viewer-role">GitHub repo writer</span>
            </span>
          </a>
          <a id="signout-link" class="action-link action-link-quiet action-link-compact" href="#" hidden>Sign out</a>
          <a class="action-link action-link-github action-link-icon-only" href="https://github.com/microsoft/aspire.dev" target="_blank" rel="noreferrer noopener" aria-label="Open repository on GitHub" title="Repository">
            <span class="action-icon action-icon-github" aria-hidden="true"></span>
          </a>
        </div>
        <div class="collection-stats">
          <strong id="window-capacity">Loading capacity...</strong>
          <span id="window-count">Loading PRs...</span>
        </div>
      </div>
    </header>

    <section class="collection-controls" aria-label="Catalog filters">
      <div class="filter-stack">
        <span class="filter-label">Authors</span>
        <div id="author-filter-bar" class="filter-dropdown" aria-busy="true">
          <button type="button" class="filter-trigger filter-trigger-loading" aria-expanded="false" disabled>
            <span class="filter-trigger-copy">
              <span class="filter-trigger-value">Loading authors...</span>
              <span class="filter-trigger-meta">Fetching authors</span>
            </span>
            <span class="filter-trigger-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
      <div class="filter-stack">
        <span class="filter-label">Status</span>
        <div id="availability-filter-bar" class="filter-dropdown" aria-busy="true">
          <button type="button" class="filter-trigger filter-trigger-loading" aria-expanded="false" disabled>
            <span class="filter-trigger-copy">
              <span class="filter-trigger-value">Loading status...</span>
              <span class="filter-trigger-meta">Fetching states</span>
            </span>
            <span class="filter-trigger-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </section>

    <section id="preview-grid" class="preview-grid" aria-live="polite" aria-busy="true">
      <article class="preview-card preview-card-skeleton" aria-hidden="true">
        <div class="preview-card-topline">
          <div class="skeleton-line skeleton-line-eyebrow"></div>
          <div class="skeleton-chip"></div>
        </div>
        <div class="preview-card-link">
          <div class="skeleton-line skeleton-line-title"></div>
          <div class="skeleton-line skeleton-line-subtitle"></div>
          <div class="preview-card-status-row">
            <div class="skeleton-chip"></div>
            <div class="skeleton-line skeleton-line-status"></div>
          </div>
        </div>
      </article>
      <article class="preview-card preview-card-skeleton" aria-hidden="true">
        <div class="preview-card-topline">
          <div class="skeleton-line skeleton-line-eyebrow"></div>
          <div class="skeleton-chip"></div>
        </div>
        <div class="preview-card-link">
          <div class="skeleton-line skeleton-line-title"></div>
          <div class="skeleton-line skeleton-line-subtitle"></div>
          <div class="preview-card-status-row">
            <div class="skeleton-chip"></div>
            <div class="skeleton-line skeleton-line-status"></div>
          </div>
        </div>
      </article>
      <article class="preview-card preview-card-skeleton" aria-hidden="true">
        <div class="preview-card-topline">
          <div class="skeleton-line skeleton-line-eyebrow"></div>
          <div class="skeleton-chip"></div>
        </div>
        <div class="preview-card-link">
          <div class="skeleton-line skeleton-line-title"></div>
          <div class="skeleton-line skeleton-line-subtitle"></div>
          <div class="preview-card-status-row">
            <div class="skeleton-chip"></div>
            <div class="skeleton-line skeleton-line-status"></div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script type="module" src="/_preview/index.js"></script>
</body>
</html>
