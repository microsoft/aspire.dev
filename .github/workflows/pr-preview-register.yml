name: PR Preview Register

on:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  register-preview:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && vars.PR_PREVIEW_BASE_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check preview configuration
        id: config
        env:
          PREVIEW_REGISTRATION_TOKEN: ${{ secrets.PR_PREVIEW_REGISTRATION_TOKEN }}
          ASPIRE_BOT_APP_ID: ${{ secrets.ASPIRE_BOT_APP_ID }}
          ASPIRE_BOT_PRIVATE_KEY: ${{ secrets.ASPIRE_BOT_PRIVATE_KEY }}
        run: |
          if [ -z "$PREVIEW_REGISTRATION_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$ASPIRE_BOT_APP_ID" ] || [ -z "$ASPIRE_BOT_PRIVATE_KEY" ]; then
            echo "app_configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "app_configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Aspire bot token
        if: ${{ steps.config.outputs.configured == 'true' && steps.config.outputs.app_configured == 'true' }}
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.ASPIRE_BOT_APP_ID }}
          private-key: ${{ secrets.ASPIRE_BOT_PRIVATE_KEY }}
          permission-actions: read
          permission-pull-requests: write

      - name: Locate preview registration metadata artifact
        if: ${{ steps.config.outputs.configured == 'true' }}
        id: metadata-artifact
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          script: |
            const run = context.payload.workflow_run;
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              });

            const metadataArtifact = artifacts.find(artifact => artifact.name === 'pr-preview-registration' && !artifact.expired);
            if (!metadataArtifact) {
              core.info(`No preview registration metadata artifact was found on run ${run.id}.`);
              core.setOutput('found', 'false');
              return;
            }

            core.setOutput('found', 'true');
            core.setOutput('artifact_id', String(metadataArtifact.id));

      - name: Download preview registration metadata
        if: ${{ steps.config.outputs.configured == 'true' && steps.metadata-artifact.outputs.found == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ steps.metadata-artifact.outputs.artifact_id }}
          path: ${{ runner.temp }}/pr-preview-registration
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve preview metadata
        if: ${{ steps.config.outputs.configured == 'true' && steps.metadata-artifact.outputs.found == 'true' }}
        id: metadata
        shell: bash
        run: |
          metadata_file="${RUNNER_TEMP}/pr-preview-registration/preview-registration.json"

          if [ ! -f "$metadata_file" ]; then
            echo "Expected preview registration metadata at $metadata_file."
            exit 1
          fi

          echo "should_register=true" >> "$GITHUB_OUTPUT"
          echo "repository_owner=$(jq -re '.repositoryOwner' "$metadata_file")" >> "$GITHUB_OUTPUT"
          echo "repository_name=$(jq -re '.repositoryName' "$metadata_file")" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(jq -re '.pullRequestNumber' "$metadata_file")" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$(jq -re '.artifactName' "$metadata_file")" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(jq -re '.headSha' "$metadata_file")" >> "$GITHUB_OUTPUT"
          echo "run_id=$(jq -re '.runId' "$metadata_file")" >> "$GITHUB_OUTPUT"
          echo "run_attempt=$(jq -re '.runAttempt' "$metadata_file")" >> "$GITHUB_OUTPUT"
          echo "completed_at=$(jq -re '.completedAtUtc' "$metadata_file")" >> "$GITHUB_OUTPUT"

      - name: Register preview build
        if: ${{ steps.config.outputs.configured == 'true' && steps.metadata.outputs.should_register == 'true' }}
        env:
          PREVIEW_BASE_URL: ${{ vars.PR_PREVIEW_BASE_URL }}
          PREVIEW_REGISTRATION_TOKEN: ${{ secrets.PR_PREVIEW_REGISTRATION_TOKEN }}
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
          ARTIFACT_NAME: ${{ steps.metadata.outputs.artifact_name }}
          HEAD_SHA: ${{ steps.metadata.outputs.head_sha }}
          RUN_ID: ${{ steps.metadata.outputs.run_id }}
          RUN_ATTEMPT: ${{ steps.metadata.outputs.run_attempt }}
          COMPLETED_AT: ${{ steps.metadata.outputs.completed_at }}
          REPOSITORY_OWNER: ${{ steps.metadata.outputs.repository_owner }}
          REPOSITORY_NAME: ${{ steps.metadata.outputs.repository_name }}
        run: |
          payload=$(jq -n \
            --arg repositoryOwner "$REPOSITORY_OWNER" \
            --arg repositoryName "$REPOSITORY_NAME" \
            --arg headSha "$HEAD_SHA" \
            --arg artifactName "$ARTIFACT_NAME" \
            --arg completedAtUtc "$COMPLETED_AT" \
            --argjson pullRequestNumber "$PR_NUMBER" \
            --argjson runId "$RUN_ID" \
            --argjson runAttempt "$RUN_ATTEMPT" \
            '{
              repositoryOwner: $repositoryOwner,
              repositoryName: $repositoryName,
              pullRequestNumber: $pullRequestNumber,
              headSha: $headSha,
              runId: $runId,
              runAttempt: $runAttempt,
              artifactName: $artifactName,
              completedAtUtc: $completedAtUtc
            }')

          curl --fail-with-body \
            --request POST \
            --url "${PREVIEW_BASE_URL%/}/api/previews/registrations" \
            --header "Authorization: Bearer $PREVIEW_REGISTRATION_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload"

      - name: Update PR description preview block
        if: ${{ steps.config.outputs.configured == 'true' && steps.metadata.outputs.should_register == 'true' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PREVIEW_BASE_URL: ${{ vars.PR_PREVIEW_BASE_URL }}
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
        with:
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          script: |
            const markerStart = '<!-- pr-preview:start -->';
            const markerEnd = '<!-- pr-preview:end -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const previewUrl = new URL(`/prs/${prNumber}/`, process.env.PREVIEW_BASE_URL).toString();
            const badgeUrl = `https://img.shields.io/badge/aspire.dev-${encodeURIComponent(`PR #${prNumber}`)}-512BD4?style=for-the-badge&labelColor=512BD4&color=555555`;

            const pullRequest = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const existingBody = pullRequest.data.body ?? '';
            const previewBlock = [
              markerStart,
              '## 🌐 Preview',
              '',
              `[![](${badgeUrl})](${previewUrl})`,
              markerEnd,
            ].join('\n');

            const blockExpression = new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`, 'm');
            const updatedBody = blockExpression.test(existingBody)
              ? existingBody.replace(blockExpression, previewBlock)
              : `${existingBody.trimEnd()}${existingBody.trim() ? '\n\n' : ''}${previewBlock}`;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: updatedBody,
            });
