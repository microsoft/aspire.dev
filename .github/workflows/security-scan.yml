name: Security Scan

on:
  workflow_call:
    inputs:
      node_version:
        required: true
        type: string

jobs:
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        version: 10

    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node_version }}
        cache: pnpm
        cache-dependency-path: src/frontend/pnpm-lock.yaml

    - name: Install frontend deps
      run: pnpm install --frozen-lockfile

    - name: Run pnpm audit
      run: pnpm audit --audit-level=moderate | tee pnpm-audit.txt
      continue-on-error: true

    - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        global-json-file: global.json

    - name: Run .NET security scan
      working-directory: src/apphost/Aspire.Dev.AppHost
      run: dotnet list package --vulnerable --include-transitive | tee ../../../src/frontend/dotnet-vulnerabilities.txt
      continue-on-error: true

    - name: Trivy filesystem vulnerability scan (SARIF)
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        scan-type: fs
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH,MEDIUM
        ignore-unfixed: true
        vuln-type: os,library
        scan-ref: .
      continue-on-error: true

    - name: Upload SARIF to GitHub code scanning
      if: ${{ always() }}
      uses: github/codeql-action/upload-sarif@c6f931105cb2c34c8f901cc885ba1e2e259cf745 # v4.34.0
      with:
        sarif_file: trivy-results.sarif

    - name: Upload security scan artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: security-scan-results
        path: |
          trivy-results.sarif
          src/frontend/pnpm-audit.txt
          src/frontend/dotnet-vulnerabilities.txt
        if-no-files-found: warn
        retention-days: 7
