<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OpenGraph Preview</title>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <header class="toolbar">
            <form id="url-form" class="url-form" autocomplete="off">
                <input
                    id="url-input"
                    class="url-input"
                    type="text"
                    spellcheck="false"
                    placeholder="https://example.com  ·  http://localhost:3000"
                    aria-label="URL to preview"
                />
                <button id="go" class="btn primary" type="submit">Preview</button>
                <button id="refresh" class="btn icon" type="button" title="Reload" aria-label="Reload">
                    &#x21bb;
                </button>
            </form>
            <nav class="tabs" role="tablist">
                <button class="tab active" data-tab="previews" role="tab">Previews</button>
                <button class="tab" data-tab="raw" role="tab">Raw metadata</button>
                <button class="tab" data-tab="diagnostics" role="tab">Diagnostics</button>
            </nav>
        </header>

        <div id="status" class="status" hidden></div>

        <main class="content">
            <section id="panel-previews" class="panel active">
                <div id="previews" class="previews-grid"></div>
            </section>
            <section id="panel-raw" class="panel">
                <div class="raw-actions">
                    <span id="raw-summary" class="muted"></span>
                    <button id="copy-json" class="btn small" type="button">Copy JSON</button>
                </div>
                <div id="raw"></div>
            </section>
            <section id="panel-diagnostics" class="panel">
                <div id="diagnostics"></div>
            </section>
        </main>

        <div id="empty" class="empty">
            <div class="empty-icon">&#x1F50E;</div>
            <p class="empty-title">Preview OpenGraph metadata</p>
            <p class="muted">
                Enter a URL above to see how it unfurls on social platforms.
                Local dev servers like <code>http://localhost:3000</code> work too.
            </p>
        </div>

        <script src="./app.js"></script>
    </body>
</html>
