<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OpenGraph Preview</title>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <header class="toolbar">
            <form id="url-form" class="url-form" autocomplete="off">
                <div class="input-wrap">
                    <svg class="input-icon" width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
                        <path
                            fill="currentColor"
                            d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1ZM2.5 8c0-.42.05-.83.14-1.22l.86.86.5.5v1l1 1 1 .5v1.36A5.5 5.5 0 0 1 2.5 8Zm6 5.46V12l-1-1v-1l-1-1H5l-1-1V6.5l1-1h2l1-1V3.2A5.5 5.5 0 0 1 13.5 8a5.5 5.5 0 0 1-5 5.46Z"
                        />
                    </svg>
                    <input
                        id="url-input"
                        class="url-input"
                        type="text"
                        spellcheck="false"
                        value="https://"
                        placeholder="https://example.com   ·   localhost:3000"
                        aria-label="URL to preview"
                    />
                </div>
                <button id="go" class="btn btn-primary" type="submit">Preview</button>
                <button id="refresh" class="btn btn-ghost btn-icon" type="button" title="Reload" aria-label="Reload">
                    <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
                        <path
                            fill="currentColor"
                            d="M8 2.5a5.5 5.5 0 1 0 5.39 6.6.75.75 0 0 1 1.47.3A7 7 0 1 1 8 1c1.74 0 3.32.64 4.53 1.69V1.75a.75.75 0 0 1 1.5 0v3a.75.75 0 0 1-.75.75h-3a.75.75 0 0 1 0-1.5h1.36A5.48 5.48 0 0 0 8 2.5Z"
                        />
                    </svg>
                </button>
            </form>
            <div class="toolbar-row">
                <nav class="tabs" role="tablist">
                    <button class="tab active" data-tab="browse" role="tab">Browse</button>
                    <button class="tab" data-tab="previews" role="tab">Previews</button>
                    <button class="tab" data-tab="raw" role="tab">Raw metadata</button>
                    <button class="tab" data-tab="diagnostics" role="tab">Diagnostics</button>
                </nav>
                <div class="examples">
                    <span class="examples-label muted">Try</span>
                    <button class="chip" data-example="https://aspire.dev" type="button">aspire.dev</button>
                </div>
            </div>
        </header>

        <div id="status" class="status" hidden></div>

        <main class="content">
            <section id="panel-previews" class="panel">
                <div class="previews-toolbar">
                    <h2 class="previews-title">Link previews</h2>
                    <div class="layout-toggle" role="group" aria-label="Preview layout">
                        <button id="layout-list" class="layout-btn active" type="button" title="List view (larger)" aria-label="List view" aria-pressed="true"></button>
                        <button id="layout-grid" class="layout-btn" type="button" title="Grid view (compact)" aria-label="Grid view" aria-pressed="false"></button>
                    </div>
                </div>
                <div id="previews" class="previews-grid layout-list"></div>
            </section>
            <section id="panel-raw" class="panel">
                <div class="raw-actions">
                    <span id="raw-summary" class="muted"></span>
                    <button id="copy-json" class="btn btn-ghost btn-sm" type="button">Copy JSON</button>
                </div>
                <div id="raw"></div>
            </section>
            <section id="panel-diagnostics" class="panel">
                <div id="diagnostics"></div>
            </section>
            <section id="panel-browse" class="panel browse-panel active">
                <div class="browse-bar">
                    <button id="browse-reload" class="btn btn-ghost btn-icon" type="button" title="Reload page" aria-label="Reload page">
                        <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
                            <path
                                fill="currentColor"
                                d="M8 2.5a5.5 5.5 0 1 0 5.39 6.6.75.75 0 0 1 1.47.3A7 7 0 1 1 8 1c1.74 0 3.32.64 4.53 1.69V1.75a.75.75 0 0 1 1.5 0v3a.75.75 0 0 1-.75.75h-3a.75.75 0 0 1 0-1.5h1.36A5.48 5.48 0 0 0 8 2.5Z"
                            />
                        </svg>
                    </button>
                    <form id="browse-form" class="browse-form" autocomplete="off">
                        <div class="browse-input-wrap">
                            <svg class="browse-input-icon" width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
                                <path
                                    fill="currentColor"
                                    d="M7.775 3.275a.75.75 0 0 0 1.06 1.06l1.25-1.25a2 2 0 1 1 2.83 2.83l-2.5 2.5a2 2 0 0 1-2.83 0 .75.75 0 0 0-1.06 1.06 3.5 3.5 0 0 0 4.95 0l2.5-2.5a3.5 3.5 0 0 0-4.95-4.95l-1.25 1.25Zm-1.55 9.45a.75.75 0 0 0-1.06-1.06l-1.25 1.25a2 2 0 1 1-2.83-2.83l2.5-2.5a2 2 0 0 1 2.83 0 .75.75 0 0 0 1.06-1.06 3.5 3.5 0 0 0-4.95 0l-2.5 2.5a3.5 3.5 0 0 0 4.95 4.95l1.25-1.25Z"
                                />
                            </svg>
                            <input
                                id="browse-input"
                                class="browse-input"
                                type="text"
                                spellcheck="false"
                                placeholder="Edit the route, or click links in the page below…"
                                aria-label="Browse route"
                            />
                        </div>
                    </form>
                    <button id="browse-open" class="btn btn-ghost btn-icon" type="button" title="Open in browser" aria-label="Open in browser">
                        <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true">
                            <path
                                fill="currentColor"
                                d="M3.75 2A1.75 1.75 0 0 0 2 3.75v8.5C2 13.216 2.784 14 3.75 14h8.5A1.75 1.75 0 0 0 14 12.25v-3.5a.75.75 0 0 0-1.5 0v3.5a.25.25 0 0 1-.25.25h-8.5a.25.25 0 0 1-.25-.25v-8.5a.25.25 0 0 1 .25-.25h3.5a.75.75 0 0 0 0-1.5h-3.5Z"
                            />
                            <path
                                fill="currentColor"
                                d="M9.75 2a.75.75 0 0 0 0 1.5h1.69L7.22 7.72a.75.75 0 1 0 1.06 1.06l4.22-4.22v1.69a.75.75 0 0 0 1.5 0v-3.5a.75.75 0 0 0-.75-.75h-3.5Z"
                            />
                        </svg>
                    </button>
                </div>
                <div class="browse-stage">
                    <iframe
                        id="browse-frame"
                        class="browse-frame"
                        title="Live page preview"
                        sandbox="allow-scripts allow-forms"
                        referrerpolicy="no-referrer"
                    ></iframe>
                    <div id="browse-empty" class="browse-empty">
                        <p class="muted">
                            Load a URL to browse the live page here. Click links or edit the
                            route above and the previews update automatically.
                        </p>
                    </div>
                </div>
            </section>

            <div id="empty" class="empty">
                <div class="empty-icon" aria-hidden="true">
                    <svg width="40" height="40" viewBox="0 0 16 16">
                        <path
                            fill="currentColor"
                            d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1ZM2.5 8c0-.42.05-.83.14-1.22l.86.86.5.5v1l1 1 1 .5v1.36A5.5 5.5 0 0 1 2.5 8Zm6 5.46V12l-1-1v-1l-1-1H5l-1-1V6.5l1-1h2l1-1V3.2A5.5 5.5 0 0 1 13.5 8a5.5 5.5 0 0 1-5 5.46Z"
                        />
                    </svg>
                </div>
                <p class="empty-title">Preview OpenGraph metadata</p>
                <p class="muted">
                    Enter a URL above to see how it unfurls on social platforms.
                    Local dev servers like <code>localhost:3000</code> work too.
                </p>
                <div class="empty-actions">
                    <button class="chip" data-example="https://aspire.dev" type="button">Try aspire.dev</button>
                </div>
            </div>
        </main>

        <footer id="footer" class="footer" data-collapsed="true">
            <button
                id="footer-toggle"
                class="footer-bar"
                type="button"
                aria-expanded="false"
                aria-controls="footer-body"
            >
                <svg class="footer-chevron" width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span id="footer-summary" class="footer-summary muted">No page loaded</span>
                <span class="footer-hint muted">Page info</span>
            </button>
            <div id="footer-body" class="footer-body" hidden></div>
        </footer>

        <script src="./app.js"></script>
    </body>
</html>
