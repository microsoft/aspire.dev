version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/src/frontend"
    schedule:
      interval: "weekly"
    groups:
      npm-all:
        patterns:
          - "*"
  # nuget: AppHost, StaticHost, tools, and test projects
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      nuget-all:
        patterns:
          - "*"
