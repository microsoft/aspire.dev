          - generic [ref=e241]:
            - paragraph [ref=e242]: The browser logs feature in Aspire lets you attach a tracked Chromium browser session to any HTTP/HTTPS resource in your AppHost. When the session is active, browser console output (logs, errors, exceptions, and network events) flows into the resource’s console log stream in the Aspire dashboard, and you can capture screenshots as command artifacts — all without leaving the dashboard.
            - complementary "Experimental API" [ref=e243]:
              - paragraph [ref=e244]:
                - img [ref=e245]
                - text: Experimental API
              - paragraph [ref=e248]:
                - text: The browser logs API is experimental. In C#,
                - code [ref=e249]: WithBrowserLogs
                - text: is gated behind the
                - code [ref=e250]: ASPIREBROWSERLOGS001
                - text: diagnostic ID, which you must suppress to use the API.
            - generic [ref=e251]:
