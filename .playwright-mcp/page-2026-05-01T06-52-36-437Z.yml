              - text: ". Aspire subscribes to the following CDP domains and forwards events to the resource’s console log stream:"
            - list [ref=e579]:
              - listitem [ref=e580]:
                - strong [ref=e581]: Runtime
                - text: — JavaScript console messages
              - listitem [ref=e582]:
                - strong [ref=e583]: Log
                - text: — browser-level log entries
              - listitem [ref=e584]:
                - strong [ref=e585]: Page
                - text: — page lifecycle events
              - listitem [ref=e586]:
                - strong [ref=e587]: Network
                - text: — network requests and failures
