            - generic [ref=e515]:
              - heading "Configure browser logs" [level=2] [ref=e516]
              - link "Section titled “Configure browser logs”" [ref=e517] [cursor=pointer]:
                - /url: "#configure-browser-logs"
                - img [ref=e519]
                - generic [ref=e521]: Section titled “Configure browser logs”
            - paragraph [ref=e522]:
              - text: The
              - strong [ref=e523]: Configure tracked browser
              - text: command opens an interactive settings dialog directly in the Aspire dashboard. Use it to adjust the browser session at runtime without restarting the AppHost.
            - paragraph [ref=e524]: "The dialog presents the following options:"
            - list [ref=e525]:
              - listitem [ref=e526]:
                - strong [ref=e527]: Scope
                - text: — Apply changes to the current resource only, or globally to all browser log resources in the AppHost.
              - listitem [ref=e528]:
                - strong [ref=e529]: Browser
                - text: — Choose a detected Chromium browser (Edge or Chrome) or specify a custom executable path.
              - listitem [ref=e530]:
                - strong [ref=e531]: User data mode
                - text: —
                - code [ref=e532]: Shared
                - text: (cross-AppHost persistent data directory) or
                - code [ref=e533]: Isolated
                - text: (per-AppHost persistent data directory).
              - listitem [ref=e534]:
                - strong [ref=e535]: Profile
                - text: — Select a discovered Chromium profile from the Aspire-managed browser hive (available in
                - code [ref=e536]: Shared
                - text: mode only).
              - listitem [ref=e537]:
                - strong [ref=e538]: Save to user secrets
                - text: — Persist the selected settings to the AppHost’s user secrets so they are restored on the next run. This option is only shown when the AppHost project has a user secrets ID configured (run
                - code [ref=e539]: aspire secret set
                - text: once in the AppHost project to initialize and store a secret).
            - complementary "Note" [ref=e540]:
              - paragraph [ref=e541]:
                - img [ref=e542]
                - text: Note
              - paragraph [ref=e545]:
                - text: The
                - strong [ref=e546]: Configure tracked browser
                - text: command is only available when the Aspire dashboard’s interaction service is active (that is, when the dashboard is connected to the AppHost). It is disabled in standalone dashboard mode.
            - paragraph [ref=e547]: "After confirming the dialog, the new configuration takes effect immediately: the current browser session restarts with the updated settings."
            - generic [ref=e548]:
              - heading "Browser sessions, tabs, and process sharing" [level=2] [ref=e549]
              - link "Section titled “Browser sessions, tabs, and process sharing”" [ref=e550] [cursor=pointer]:
                - /url: "#browser-sessions-tabs-and-process-sharing"
                - img [ref=e552]
                - generic [ref=e554]: Section titled “Browser sessions, tabs, and process sharing”
            - paragraph [ref=e555]:
              - text: Aspire shares one Chromium process across every tracked browser session that targets the same browser executable and user data directory. Each call to
              - strong [ref=e556]: Open tracked browser
              - text: opens a
              - strong [ref=e557]: new tab
              - text: (Chrome DevTools Protocol page target) inside that shared browser, not a new window or process.
            - paragraph [ref=e558]: "This means:"
            - list [ref=e559]:
              - listitem [ref=e560]: Multiple resources that all use the default settings share a single browser window with one tab per resource.
              - listitem [ref=e561]:
                - text: Switching
                - code [ref=e562]: userDataMode
                - text: from
                - code [ref=e563]: Shared
                - text: to
                - code [ref=e564]: Isolated
                - text: ", choosing a different"
                - code [ref=e565]: browser
                - text: ", or selecting a different"
                - code [ref=e566]: profile
                - text: produces a different identity, which spins up a separate browser process.
              - listitem [ref=e567]:
                - text: Within the same user data directory, requesting a named
                - code [ref=e568]: profile
                - text: while another session is already running with a different profile fails with a conflict error rather than silently mixing profiles.
              - listitem [ref=e569]: The tracked browser persists across AppHost runs. When you stop the AppHost, the browser stays open; the next AppHost run adopts the existing browser via the Chrome DevTools Protocol endpoint and adds new tabs to it.
            - generic [ref=e570]:
              - heading "How browser logs are captured" [level=2] [ref=e571]
              - link "Section titled “How browser logs are captured”" [ref=e572] [cursor=pointer]:
                - /url: "#how-browser-logs-are-captured"
                - img [ref=e574]
                - generic [ref=e576]: Section titled “How browser logs are captured”
            - paragraph [ref=e577]:
              - text: The tracked browser connects to the Aspire AppHost over the
              - link "Chrome DevTools Protocol (CDP)" [ref=e578] [cursor=pointer]:
